services:
  - type: web
    name: incidencias-app
    runtime: python
    buildCommand: bash build.sh
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: incidencias-db
          property: connectionString

databases:
  - name: incidencias-db
    plan: free
